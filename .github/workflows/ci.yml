name: CI

# Lance les trois gardes imposés par CLAUDE.md (typecheck + lint + test)
# à chaque push sur main et sur chaque Pull Request.
on:
  push:
    branches: [main, develop]
  pull_request:

# Annule une exécution précédente encore en cours sur la même branche.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verifs:
    name: typecheck · lint · test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Installer Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Installer les dépendances
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Tests
        run: npm test
