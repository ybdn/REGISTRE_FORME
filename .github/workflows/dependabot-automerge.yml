name: Dependabot auto-merge

# Fusionne sans intervention les PR ouvertes par Dependabot (mises à jour
# d'actions GitHub) dès que la CI requise est verte. Zéro friction.
on: pull_request

permissions:
  contents: write
  pull-requests: write

jobs:
  automerge:
    runs-on: ubuntu-latest
    if: github.actor == 'dependabot[bot]'
    steps:
      - name: Activer l'auto-merge (squash) après CI verte
        run: gh pr merge --auto --squash "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
