# Déploiement de l'app web (PWA) sur GitHub Pages (docs/07 §8.3).
# Build statique Expo web → dist/ → Pages. SPA : index.html copié en 404.html
# (GitHub Pages ne gère pas les rewrites, sinon un rechargement profond renvoie 404).
name: Déploiement web (GitHub Pages)

on:
  push:
    branches: [main]
  workflow_dispatch:

# Un seul déploiement à la fois ; on n'annule pas un déploiement en cours.
concurrency:
  group: pages
  cancel-in-progress: false

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploiement.outputs.page_url }}
    env:
      EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}
      EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY }}
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Export web statique
        # Le sous-chemin /REGISTRE_FORME est fourni par app.json (experiments.baseUrl).
        run: npx expo export -p web
      - name: Repli SPA (404 → index)
        run: cp dist/index.html dist/404.html
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist
      - id: deploiement
        uses: actions/deploy-pages@v4
